global:
  smtp_smarthost: ${ALERT_SMTP_SMARTHOST}
  smtp_from: ${ALERT_SMTP_FROM}
  smtp_auth_username: ${ALERT_SMTP_AUTH_USERNAME}
  smtp_auth_password: ${ALERT_SMTP_AUTH_PASSWORD}
  smtp_require_tls: true

route:
  receiver: gmail
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: gmail
    email_configs:
      - to: ${ALERT_EMAIL_TO}
        send_resolved: true
