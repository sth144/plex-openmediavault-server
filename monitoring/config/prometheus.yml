global:
  scrape_interval: 15s
#evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "127.0.0.1:9093"

rule_files:
  - "/etc/prometheus/alert.rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["192.168.1.245:9090"] # localhost
  - job_name: "pushgateway"
    static_configs:
      - targets: ["192.168.1.245:9091"]
  - job_name: "node_exporter_openmediavault"
    static_configs:
      - targets: [
          # localhost
	        "192.168.1.245:9100",
        ]
  - job_name: "node_exporter_RPi_pc0"
    static_configs:
      - targets: [
          # TODO: DNS!!! pc0
          "192.168.1.240:9100",
        ]
  - job_name: "node_exporter_RPi_pc1"
    static_configs:
      # TODO: DNS!!! pc1
      - targets: ["192.168.1.241:9100"]
  - job_name: "node_exporter_RPi_pc2"
    static_configs:
      # TODO: DNS!!! pc2
      - targets: ["192.168.1.242:9100"]
  - job_name: "node_exporter_RPi_main"
    static_configs:
      - targets: [
          # TODO: DNS!!! home.assistant
          "192.168.1.243:9100",
        ]
  - job_name: "node_exporter_desktop"
    static_configs:
      - targets: [
          # TODO: DNS!!! sthinds.local
          "192.168.1.235:9100",
          "192.168.1.235:9400",
          "192.168.1.235:9835",
          "192.168.1.235:9836"
        ]
  - job_name: "node_exporter_macbook_m4"
    static_configs:
      - targets: [
          "192.168.1.236:9100"
        ]
  - job_name: "cadvisor"
    static_configs:
      - targets: ["192.168.1.245:8080"]
  - job_name: "blackbox_http"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://sth144.duckdns.org
          - https://open-webui.sth144.duckdns.org
          - https://joplin.sth144.duckdns.org
          - http://192.168.1.245:32400
          - http://192.168.1.245:9080
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.1.245:9115
