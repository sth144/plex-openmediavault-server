version: "2.4"
services:
  grafana:
    image: grafana/grafana:latest
    restart: always
    user: "$UID:$GID"
    container_name: grafana
    depends_on:
      prometheus:
        condition: service_healthy
    network_mode: "host"
    #ports:
    #  - "3000:3000"
    volumes:
      - /home/sthinds/Volumes/grafana:/var/lib/grafana
      - ./config/provisioning:/etc/grafana/provisioning
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 1024m
    cpus: 1.0
  telegraf:
    image: telegraf:1.16
    container_name: telegraf
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    # links:
    #   - influxdb
    depends_on:
      influxdb:
        condition: service_healthy
    #ports:
    #  - 8092:8092/udp
    #  - 8094:8094
    #  - 8125:8125/udp
    #- 8086:8086
    network_mode: "host"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 512m
    cpus: 0.5
  chronograf:
    image: chronograf:latest
    ports: 
      - '127.0.0.1:8888:8888'
    volumes:
      - /home/sthinds/Volumes/chronograf:/var/lib/chronograf
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      - INFLUXDB_URL=http://127.0.0.1:8086
      - INFLUXDB_USERNAME=${INFLUXDB_ADMIN_USER}
      - INFLUXDB_PASSWORD=${INFLUXDB_ADMIN_PASSWORD}
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8888/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 512m
    cpus: 0.5
  prometheus:
    image: prom/prometheus:latest
    restart: always
    user: "$UID:$GID"
    container_name: prometheus
    network_mode: "host"
    #ports:
    #  - 9090:9090
    command: --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.retention.time=30d
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - /home/sthinds/Volumes/prometheus:/prometheus
    privileged: true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/ready >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 2048m
    cpus: 1.0
  influxdb:
    image: influxdb:1.8.4
    restart: unless-stopped
    #ports:
    #  - 8086:8086
    volumes:
      - /home/sthinds/Volumes/influxdb:/var/lib/influxdb
    environment:
      - INFLUXDB_DB=db0
      # TODO: hide these
      - INFLUXDB_ADMIN_USER=${INFLUXDB_ADMIN_USER}
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_ADMIN_PASSWORD}
    network_mode: "host"  
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8086/ping >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 2048m
    cpus: 1.0
  loki:
    #image: grafana/loki:2.0.0
    image: grafana/loki:latest
    restart: always
    #ports:
    #  - 3100:3100
    command: -config.file=/etc/loki/config.yaml
    network_mode: host
    volumes:
      - ./config/loki-config.yaml:/etc/loki/config.yaml
      - /home/sthinds/Volumes/loki:/loki
      - /home/sthinds/Volumes/loki-wal:/wal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/ready >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 2048m
    cpus: 1.0
  promtail:
    #image: grafana/promtail:2.0.0
    image: grafana/promtail:latest
    restart: always
    ports: 
      - 10080:9080
    volumes:
      - /etc/promtail/:/etc/promtail/
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /home/sthinds/Volumes/promtail:/var/lib/promtail
    command: -config.file=/etc/promtail/promtail.yaml
    depends_on:
      loki:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 512m
    cpus: 0.5
  pushgateway:
    image: prom/pushgateway:v1.0.1
    restart: always
    command:
      - --persistence.file=/data/pushgateway.data
      - --persistence.interval=1h
    expose:
      - 9091
    ports:
      - 9091:9091
    volumes: 
      - /home/sthinds/Volumes/pushgateway:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9091/-/ready >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m
    cpus: 0.25
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: always
    network_mode: host
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --config.expand-env
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - /home/sthinds/Volumes/alertmanager:/alertmanager
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9093/-/ready >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m
    cpus: 0.25
  blackbox:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox-exporter
    restart: always
    network_mode: host
    command:
      - --config.file=/etc/blackbox/blackbox.yml
    volumes:
      - ./config/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m
    cpus: 0.25
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    network_mode: host
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 512m
    cpus: 0.5
