version: "2.4"

services:
  db:
    image: mariadb
    container_name: nextcloud-mariadb
    ports:
      - 3306:3306
    volumes:
      - /home/sthinds/Volumes/nextcloud/db:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
    environment:
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
    env_file:
      - .env.MYSQL_ROOT_PASSWORD
      - .env.MYSQL_PASSWORD
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u nextcloud -p$${MYSQL_PASSWORD} >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 2048m
    cpus: 1.0
  
  redis:
    image: redis:4.0-alpine
    ports:
      - 6379:6379
    restart: always
    # TODO: secret password...
    command: redis-server --requirePass "$REDIS_HOST_PASSWORD"
    volumes:
      - /home/sthinds/Volumes/nextcloud/redis:/var/lib/redis
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 512m
    cpus: 0.5

  app:
    build: .
    #image: sthinds/nextcloud:latest
    container_name: nextcloud-app
    ports:
      - 9443:443
      - 9080:80
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config:/var/www/html/config
      - /home/sthinds/Volumes/nextcloud/app:/var/www/html
      - /home/sthinds/Volumes/nextcloud/custom_apps:/var/www/html/custom_apps
      - /home/sthinds/Volumes/nextcloud/data:/var/www/html/data
      - /home/sthinds/Volumes/nextcloud/themes:/var/www/html/themes
      - /etc/localtime:/etc/localtime:ro
    environment:
      - VIRTUAL_HOST=sthinds144.duckdns.org
      - REDIS_HOST=redis
      - REDIS_HOST_PASSWORD=$REDIS_HOST_PASSWORD
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/status.php >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 2048m
    cpus: 1.0

volumes:
  nextcloud:
  db:
