---
version: "2.1"
services:
  kavita:
    image: jvmilazz0/kavita:latest
    container_name: kavita
    ports:
      - 8181:5000
    volumes:
      - /home/sthinds/data/Documents:/books/Documents
      - /home/sthinds/data/Literature:/books/Literature
      - ./config:/kavita/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/ >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 1024m
    cpus: 1.0
